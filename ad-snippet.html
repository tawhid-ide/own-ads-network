<!--
  =============================================
  AdsHub Ad Snippet
  তোমার যেকোনো Website/Blog/Game-এ এটা paste করো
  zone পরিবর্তন করো: banner / leaderboard / square
  =============================================
-->

<div id="adshub-container" style="text-align:center;margin:10px 0;"></div>

<script>
(function() {
  var AD_SERVER = 'https://adserver-xxxx.onrender.com'; // তোমার Render URL দাও
  var ZONE = 'banner'; // banner / leaderboard / square
  var APP_ID = 'my-website'; // তোমার app/site এর নাম

  fetch(AD_SERVER + '/ad?zone=' + ZONE + '&app=' + APP_ID)
    .then(function(res) { return res.json(); })
    .then(function(ad) {
      var container = document.getElementById('adshub-container');
      container.innerHTML =
        '<a href="' + ad.click_url + '" target="_blank" rel="noopener">' +
        '<img src="' + ad.image + '" width="' + ad.width + '" height="' + ad.height + '" ' +
        'alt="' + ad.title + '" style="max-width:100%;border:none;" />' +
        '</a>';
    })
    .catch(function(err) {
      // Ad load না হলে কিছু দেখাবে না
      console.log('AdsHub: No ad available');
    });
})();
</script>
